<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting - Spring MVC Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-2xl mx-auto">
        <!-- Card Greeting -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <!-- Header dengan gradient -->
            <div class="bg-gradient-to-r from-green-500 to-green-600 px-6 py-8">
                <h1 class="text-3xl font-bold text-white text-center" th:text="${greeting}">Hello, World!</h1>
            </div>

            <!-- Konten -->
            <div class="p-8">
                <!-- Animasi dan ikon greeting -->
                <div class="flex justify-center mb-6">
                    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center animate-bounce">
                        <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                </div>

                <!-- Pesan selamat datang -->
                <p class="text-gray-600 text-center mb-8">
                    Selamat datang di aplikasi Spring MVC Lab. Ini adalah halaman greeting sederhana.
                </p>

                <!-- Tombol navigasi -->
                <div class="flex justify-center space-x-4">
                    <a th:href="@{/}"
                       class="inline-flex items-center px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg transition-all duration-200 hover:shadow-lg transform hover:-translate-y-0.5">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        Kembali ke Home
                    </a>

                    <a th:href="@{/about}"
                       class="inline-flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-all duration-200 hover:shadow-lg transform hover:-translate-y-0.5">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Tentang Aplikasi
                    </a>
                </div>
            </div>
        </div>

        <!-- Informasi tambahan -->
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>© 2026 Spring MVC Lab. All rights reserved.</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
