<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Detail Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Produk ditemukan -->
    <div th:if="${product != null}">
        <!-- Breadcrumb -->
        <nav class="flex mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a th:href="@{/}"
                       class="inline-flex items-center text-sm text-gray-700 hover:text-blue-600 transition-colors duration-200">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                        </svg>
                        Home
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
                        </svg>
                        <a th:href="@{/products}"
                           class="ml-1 text-sm text-gray-700 hover:text-blue-600 transition-colors duration-200 md:ml-2">
                            Produk
                        </a>
                    </div>
                </li>
                <li aria-current="page">
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
                        </svg>
                        <span class="ml-1 text-sm text-gray-500 font-medium md:ml-2"
                              th:text="${product.name}">Nama</span>
                    </div>
                </li>
            </ol>
        </nav>

        <h1 class="text-3xl font-bold text-gray-800 mb-6" th:text="${product.name}">Nama Produk</h1>

        <!-- Card Detail Produk -->
        <div class="max-w-2xl bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-gray-50 to-white px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-700">Informasi Produk</h2>
            </div>
            <div class="p-6">
                <table class="min-w-full">
                    <tbody class="divide-y divide-gray-200">
                    <tr>
                        <th class="py-4 text-left text-sm font-semibold text-gray-600 w-32">ID</th>
                        <td class="py-4 text-sm text-gray-800" th:text="${product.id}">1</td>
                    </tr>
                    <tr>
                        <th class="py-4 text-left text-sm font-semibold text-gray-600">Nama</th>
                        <td class="py-4 text-sm text-gray-800" th:text="${product.name}">Nama</td>
                    </tr>
                    <tr>
                        <th class="py-4 text-left text-sm font-semibold text-gray-600">Kategori</th>
                        <td class="py-4 text-sm">
                            <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                               class="text-blue-600 hover:text-blue-800 hover:underline inline-flex items-center">
                                <span th:text="${product.category}">Kategori</span>
                                <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <th class="py-4 text-left text-sm font-semibold text-gray-600">Harga</th>
                        <td class="py-4 text-sm font-bold text-green-600"
                            th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                            Rp 0
                        </td>
                    </tr>
                    <tr>
                        <th class="py-4 text-left text-sm font-semibold text-gray-600">Stok</th>
                        <td class="py-4 text-sm">
                            <div class="flex items-center">
                                <span class="font-medium mr-2" th:text="${product.stock}">0</span>
                                <span th:if="${product.stock < 20}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 animate-pulse">
                                        <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-1"></span>
                                        Stok Menipis!
                                    </span>
                                <span th:if="${product.stock >= 20}"
                                      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1"></span>
                                        Tersedia
                                    </span>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${product.stock < 10}">
                        <td colspan="2" class="py-3">
                            <div class="bg-yellow-50 border border-yellow-200 rounded-md p-3">
                                <p class="text-sm text-yellow-700">
                                    <span class="font-medium">Perhatian!</span> Stok hampir habis. Segera lakukan restock.
                                </p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Produk tidak ditemukan -->
    <div th:if="${product == null}" class="mb-6">
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-sm">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div class="ml-3">
                    <h4 class="text-lg font-medium text-red-800">Produk Tidak Ditemukan</h4>
                    <p class="text-sm text-red-700 mt-1" th:text="${error}">Error message</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tombol Aksi -->
    <div class="mt-6 flex items-center space-x-4">
        <a th:href="@{/products}"
           class="inline-flex items-center px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-md transition-all duration-200 hover:shadow-lg transform hover:-translate-y-0.5">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Kembali ke Daftar
        </a>

        <a th:href="@{/}"
           class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-all duration-200 hover:shadow-lg transform hover:-translate-y-0.5">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            Ke Halaman Utama
        </a>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
