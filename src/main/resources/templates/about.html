<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Spring MVC Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header dengan gradient -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-6 py-8">
            <h1 class="text-3xl font-bold text-white" th:text="${appName}">Spring MVC Lab</h1>
        </div>

        <!-- Konten -->
        <div class="p-6">
            <!-- Info Card -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-gray-50 rounded-lg p-5 border border-gray-200">
                    <div class="flex items-center mb-3">
                        <svg class="w-5 h-5 text-blue-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <h3 class="text-lg font-semibold text-gray-800">Informasi Aplikasi</h3>
                    </div>
                    <div class="space-y-2">
                        <p class="text-gray-600">
                            <span class="font-medium text-gray-700">Version:</span>
                            <span class="ml-2 text-gray-800" th:text="${version}">1.0.0</span>
                        </p>
                        <p class="text-gray-600">
                            <span class="font-medium text-gray-700">Author:</span>
                            <span class="ml-2 text-gray-800" th:text="${author}">John Doe</span>
                        </p>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-lg p-5 border border-gray-200">
                    <div class="flex items-center mb-3">
                        <svg class="w-5 h-5 text-blue-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
                        </svg>
                        <h3 class="text-lg font-semibold text-gray-800">Deskripsi</h3>
                    </div>
                    <p class="text-gray-600">
                        Aplikasi demo Spring MVC untuk pembelajaran web development dengan Thymeleaf dan Tailwind CSS.
                    </p>
                </div>
            </div>

            <!-- Technologies Section -->
            <div class="mt-8">
                <div class="flex items-center mb-4">
                    <svg class="w-5 h-5 text-blue-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                    <h3 class="text-xl font-semibold text-gray-800">Technologies:</h3>
                </div>

                <ul class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    <li th:each="tech : ${technologies}"
                        class="flex items-center p-3 bg-gradient-to-r from-gray-50 to-white rounded-lg border border-gray-200 hover:shadow-md transition-shadow duration-200">
                        <span class="w-2 h-2 bg-blue-600 rounded-full mr-3"></span>
                        <span class="text-gray-700 font-medium" th:text="${tech}">Spring Boot</span>
                    </li>
                </ul>
            </div>

            <!-- Navigation Buttons -->
            <div class="mt-8 flex items-center space-x-4">
                <a th:href="@{/}"
                   class="inline-flex items-center px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-md transition-all duration-200 hover:shadow-lg transform hover:-translate-y-0.5">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Kembali ke Home
                </a>

                <a th:href="@{/products}"
                   class="inline-flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-all duration-200 hover:shadow-lg transform hover:-translate-y-0.5">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                    Lihat Produk
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
